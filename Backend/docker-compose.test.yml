version: '3.9'

services:
  test-db:
    image: postgres:16
    container_name: shop-test-db
    restart: always
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: shop_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test']
      interval: 3s
      timeout: 3s
      retries: 10
