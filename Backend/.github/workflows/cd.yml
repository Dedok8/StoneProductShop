name: CD — Deploy to Production

on:
  push:
    branches: [main]
  # Deploy only when CI passes
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Deploy only on successful CI
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    environment:
      name: production
      url: https://stoneshop.your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Install ALL deps (including devDependencies) — needed for nest build (@nestjs/cli)
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ─── Option A: Deploy to VPS via SSH ───────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/stoneshop
            git pull origin main
            npm ci
            npm run build
            npx prisma migrate deploy
            pm2 restart stoneshop-backend || pm2 start dist/main.js --name stoneshop-backend
            echo "✅ Deployed successfully"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      # ─── Option B: Deploy to Railway / Render ────────────
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: stoneshop-backend

      # ─── Post-deploy: verify the service is alive ──────────────
      - name: Health check after deploy
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://stoneshop.your-domain.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Service is healthy"

      # ─── Telegram notification on success ───────────────
      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ StoneProductShop deployed successfully to production%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Deploy FAILED%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"
